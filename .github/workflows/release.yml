name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - release-preview
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  validate:
    name: Validate release source
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}
      release-version: ${{ steps.version.outputs.release-version }}
      is-release: ${{ steps.version.outputs.is-release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust 1.92.0
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt,clippy
          rustup default 1.92.0

      - name: Validate version and source
        id: version
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$cargo_version"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must use vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi

            release_version="${GITHUB_REF_NAME#v}"
            if [[ "$release_version" != "$cargo_version" ]]; then
              echo "Tag version $release_version does not match Cargo.toml $cargo_version." >&2
              exit 1
            fi

            grep -Fq "## [$release_version] - " CHANGELOG.md
            scripts/extract-changelog.sh "$release_version" CHANGELOG.md > /tmp/release-notes.md
            test -s /tmp/release-notes.md

            git fetch --no-tags origin main
            if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              echo "Release tags must point to a commit contained in origin/main." >&2
              exit 1
            fi

            package_version="$release_version"
            is_release=true
          else
            release_version="$cargo_version"
            package_version="${cargo_version}-preview.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
            is_release=false
          fi

          echo "package-version=$package_version" >> "$GITHUB_OUTPUT"
          echo "release-version=$release_version" >> "$GITHUB_OUTPUT"
          echo "is-release=$is_release" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Check dashboard JavaScript syntax
        run: >-
          /System/Library/Frameworks/JavaScriptCore.framework/Versions/A/Helpers/jsc
          --ignoreUncaughtExceptions --strict-file=src/dashboard/app.js

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.92.0
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup target add "${{ matrix.target }}"

      - name: Build native release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package release archive
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.validate.outputs.package-version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package_dir="simple-profiler-v${PACKAGE_VERSION}-${TARGET}"
          archive="${package_dir}.tar.gz"

          mkdir -p "dist/$package_dir/config"
          cp "target/$TARGET/release/simple-profiler" "dist/$package_dir/"
          cp README.md CHANGELOG.md "dist/$package_dir/"
          cp config/default.toml "dist/$package_dir/config/"
          tar -C dist -czf "dist/$archive" "$package_dir"
          (cd dist && shasum -a 256 "$archive" > "$archive.sha256")

      - name: Upload packaged binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: simple-profiler-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    if: needs.validate.outputs.is-release == 'true'
    needs:
      - validate
      - build
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download packaged binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums and release notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release-version }}
        run: |
          set -euo pipefail
          (cd dist && shasum -a 256 *.tar.gz > SHA256SUMS)
          scripts/extract-changelog.sh "$RELEASE_VERSION" CHANGELOG.md > release-notes.md

      - name: Publish immutable tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release-version }}
        run: >-
          gh release create "v${RELEASE_VERSION}"
          dist/*.tar.gz dist/SHA256SUMS
          --verify-tag
          --title "Simple Profiler v${RELEASE_VERSION}"
          --notes-file release-notes.md
